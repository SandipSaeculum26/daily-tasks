<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./script.js">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="contrainer">
        <div class="box">
            <div>
             <div class="top-left">
                <div class="image-container">
                    <img src="https://media.licdn.com/dms/image/v2/D4D0BAQGVaQ9FQNb35w/company-logo_200_200/company-logo_200_200/0/1687782098649/saeculumsolutions_logo?e=2147483647&v=beta&t=dD1tsmwqac9Lf04Q7X3Vfp6zLv8sLI6x-bWxmkr_OSg" alt="">
                </div>
                <div class="top-right">
                    <div class="text-container">
                        <i class="fa-solid fa-xmark"></i>
                        <h1>Don't miss out</h1>
                        <p>Sign up for our newsletter to stay in the top</p>
                    </div>
                </div>
             </div>

             <div class="bottom">
                <div class="bottom-left">
                    <input type="email" placeholder="Enter your email" required><button>Subscribe</button>
                </div>
             </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dark-light-mode-tailwind</title>
    <link rel="stylesheet" href="output.css" />
    <script src="theme.js" defer></script>
  </head>

  <body class="bg-white text-black dark:bg-gray-900 dark:text-white">
    <!-- Icons -->
    <div class="flex justify-end items-center">
     

     
    </div>

    <div class="p-4">
      <h1 class="text-2xl font-bold">Hello, Tailwind!</h1>
      <p>This text changes based on the theme.</p>

      <!-- Toggle Button -->
      <button
        onclick="toggleTheme()"
        class="mt-4 px-4 py-2 bg-blue-700 rounded cursor-pointer flex"
      >
      <svg
         id="sunIcon"
        class="w-6 h-6 text-yellow-500 dark:hidden"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
        />
      </svg>

      <svg
      id="moonIcon"
      class="w-6 h-6 text-gray-300 hidden dark:inline"
      xmlns="http://www.w3.org/2000/svg"
      class="h-6 w-6"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
      />
    </svg>
        Toggle Theme
      </button>
      
    </div>
  </body>
</html>

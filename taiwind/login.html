<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body>
    <nav class="bg-gray-300 p-4 flex justify-between items-center">
      <div>
        <ul class="flex gap-5 items-center justify-center">
          <li class="text-2xl font-bold border-b-2"><a href="">Home</a></li>
          <li class="text-xl font-bold"><a href="">About</a></li>
          <li class="text-xl font-bold"><a href="">Contact</a></li>
        </ul>
      </div>
      <div>
        <ul class="flex gap-5">
          <button class="px-4 py-2 bg-gray-600 text-white rounded-md">
            theme
          </button>
          <li class="text-xl font-bold"><a href="">Login</a></li>
          <li class="text-xl font-bold"><a href="">Signup</a></li>
        </ul>
      </div>
    </nav>
    <div class="flex justify-center items-center min-h-screen">
      <div class="bg-var(--primary-color) rounded-lg p-8 shadow-2xl max-w-sm w-full">
        <h2 class="text-center text-3xl text-white mb-6 font-bold">Login</h2>
        <form>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-300 mb-2" for=""
              >Email</label
            >
            <input
              class="w-full px-3 py-2 bg-gray-600 border-gray-700 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              type="email"
              name=""
              placeholder="Email"
              id=""
              required
            />
          </div>
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2" for=""
              >Password</label
            >
            <input
              class="w-full px-3 py-2 bg-gray-600 border-gray-700 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              type="password"
              name=""
              placeholder="password"
              id=""
              required
            />
          </div>
          <button
            class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 shadow-2xl cursor-pointer"
            type="submit"
          >
            Login
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
